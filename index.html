<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>お買い物リスト</title>
    <style>
        :root {
            --primary: #3b82f6; --bg: #f3f4f6; --text-main: #1f2937;
            --text-muted: #6b7280; --white: #ffffff; --accent: #10b981;
            --card-shadow: rgba(0,0,0,0.1);
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #111827; --text-main: #f9fafb; --text-muted: #9ca3af; --white: #1f2937; }
            input, textarea { background-color: #374151; color: white; border-color: #4b5563; }
        }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 120px; }
        .container { max-width: 448px; margin: 0 auto; padding: 1rem; }
        .card { background: var(--white); padding: 1rem; border-radius: 0.75rem; box-shadow: 0 1px 3px var(--card-shadow); margin-bottom: 1rem; }
        .input-group { display: flex; gap: 0.5rem; align-items: center; }
        input[type="text"] { flex: 1; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 16px; outline: none; }
        .btn-add { background: var(--primary); color: white; padding: 0.75rem 1rem; border-radius: 0.5rem; border: none; font-weight: bold; }
        .mic-btn { font-size: 1.5rem; background: none; border: none; cursor: pointer; color: var(--text-muted); }
        .mic-btn.recording { color: #ef4444; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .item-card { background: var(--white); padding: 0.8rem; border-radius: 0.5rem; margin-bottom: 0.5rem; box-shadow: 0 1px 2px var(--card-shadow); }
        .item-main { display: flex; align-items: center; gap: 0.5rem; }
        .item-text { flex: 1; font-weight: 500; }
        .num-input { width: 45px; padding: 0.4rem; border: 1px solid #e5e7eb; border-radius: 0.25rem; text-align: center; }
        .price-input { width: 80px; padding: 0.4rem; border: 1px solid #e5e7eb; border-radius: 0.25rem; text-align: right; }
        .footer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1f2937; color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .total-amount { font-size: 1.4rem; font-weight: bold; color: var(--accent); }
        .month-summary-bar { background: #374151; color: white; padding: 0.5rem 1rem; border-radius: 0.5rem; margin: 1rem 0 0.5rem; font-size: 0.85rem; display: flex; justify-content: space-between; font-weight: bold; }
        .tabs { display: flex; background: var(--white); border-radius: 0.5rem; margin-bottom: 1rem; overflow: hidden; }
        .tab-btn { flex: 1; padding: 0.75rem; border: none; background: none; color: var(--text-muted); cursor: pointer; }
        .tab-active { background: var(--primary); color: white; font-weight: bold; }
        .hidden { display: none !important; }
        .tax-btn { font-size: 0.7rem; padding: 4px 8px; border: 1px solid #d1d5db; border-radius: 4px; background: var(--bg); cursor: pointer; }
        .tax-btn.active { background: var(--primary); color: white; }
        .chip { padding: 4px 10px; border-radius: 99px; background: #eff6ff; color: var(--primary); font-size: 0.75rem; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛒 お買い物リスト</h1>

    <div class="tabs">
        <button onclick="switchTab('list')" id="tabList" class="tab-btn tab-active">リスト</button>
        <button onclick="switchTab('history')" id="tabHistory" class="tab-btn">履歴</button>
    </div>

    <div id="listView">
        <div class="card">
            <div class="input-group">
                <input type="text" id="itemInput" placeholder="何を買う？" onkeypress="if(event.key==='Enter') addItem()">
                <button onclick="startVoice()" id="micBtn" class="mic-btn">🎙️</button>
                <button onclick="addItem()" class="btn-add">追加</button>
            </div>
            <div id="templateContainer" style="display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:10px;"></div>
        </div>
        <div id="shoppingList"></div>
    </div>

    <div id="historyView" class="hidden">
        <div id="historyList"></div>
    </div>
</div>

<div class="footer-bar" id="footerBar">
    <div><div style="font-size:0.7rem; color:#9ca3af;">チェック済合計</div><div class="total-amount">¥ <span id="totalPrice">0</span></div></div>
    <button onclick="archiveChecked()" id="archiveBtn" style="background:var(--primary); color:white; border:none; padding:0.8rem 1.2rem; border-radius:0.5rem; font-weight:bold;">履歴に保存</button>
</div>

<script>
    // 全ての関数を最初に定義してブラウザに認識させる
    const KEY = 'SHOP_DATA_V6';
    let items = JSON.parse(localStorage.getItem(KEY+'_i')) || [];
    let hist = JSON.parse(localStorage.getItem(KEY+'_h')) || [];
    let tpls = JSON.parse(localStorage.getItem(KEY+'_t')) || [];

    function save() {
        localStorage.setItem(KEY+'_i', JSON.stringify(items));
        localStorage.setItem(KEY+'_h', JSON.stringify(hist));
        localStorage.setItem(KEY+'_t', JSON.stringify(tpls));
        render();
    }

    // グローバルに登録
    window.addItem = function(text = null) {
        const input = document.getElementById('itemInput');
        const val = text || input.value.trim();
        if (!val) return;
        items.push({ id: Date.now() + Math.random(), text: val, checked: false, price: 0, qty: 1, tax: null });
        input.value = '';
        save();
    };

    window.startVoice = function() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return alert("音声入力非対応");
        const rec = new SpeechRecognition(); rec.lang = 'ja-JP';
        const btn = document.getElementById('micBtn');
        rec.onstart = () => { btn.classList.add('recording'); btn.textContent = '🔴'; };
        rec.onend = () => { btn.classList.remove('recording'); btn.textContent = '🎙️'; };
        rec.onresult = (e) => addItem(e.results[0][0].transcript.replace(/[。．]$/, ""));
        rec.start();
    };

    window.switchTab = function(t) {
        document.getElementById('listView').classList.toggle('hidden', t!=='list');
        document.getElementById('historyView').classList.toggle('hidden', t!=='history');
        document.getElementById('tabList').className = `tab-btn ${t==='list'?'tab-active':''}`;
        document.getElementById('tabHistory').className = `tab-btn ${t==='history'?'tab-active':''}`;
        document.getElementById('footerBar').classList.toggle('hidden', t!=='list');
    };

    window.archiveChecked = function() {
        const checked = items.filter(i => i.checked);
        const total = checked.reduce((s, i) => s + Math.floor((i.price * i.qty) * (1 + (i.tax||0)/100)), 0);
        if (!checked.length || total === 0) return alert("金額とチェックを確認してください");
        
        const now = new Date();
        hist.unshift({
            id: Date.now(),
            date: `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`,
            monthKey: `${now.getFullYear()}年${now.getMonth()+1}月`,
            total: total,
            items: checked.map(i => ({...i, fPrice: Math.floor((i.price * i.qty) * (1 + (i.tax||0)/100))}))
        });
        items = items.filter(i => !i.checked);
        save();
    };

    function render() {
        const listEl = document.getElementById('shoppingList');
        const tplEl = document.getElementById('templateContainer');
        const hListEl = document.getElementById('historyList');
        if(!listEl) return;

        let currentTotal = 0;

        // 定番チップ
        tplEl.innerHTML = tpls.map(t => `<button class="chip" onclick="addItem('${t}')">＋${t}</button>`).join('');

        // メインリスト
        listEl.innerHTML = items.map(i => {
            const taxed = Math.floor((i.price * i.qty) * (1 + (i.tax||0)/100));
            if (i.checked) currentTotal += taxed;
            const prev = (function(){ for(let g of hist){ let f=g.items.find(x=>x.text===i.text); if(f) return f.price; } return null; })();
            
            return `
                <div class="item-card">
                    <div class="item-main">
                        <input type="checkbox" ${i.checked?'checked':''} onchange="items.find(x=>x.id===${i.id}).checked=this.checked; save();" style="width:22px;height:22px;">
                        <span class="item-text" onclick="const n=prompt('修正', '${i.text}'); if(n){items.find(x=>x.id===${i.id}).text=n; save();}">${i.text}</span>
                        <button onclick="tpls.includes('${i.text}')?tpls=tpls.filter(x=>x!=='${i.text}'):tpls.push('${i.text}'); save();" style="border:none;background:none;color:${tpls.includes(i.text)?'#f59e0b':'#d1d5db'};">★</button>
                        <input type="number" class="num-input" value="${i.qty}" placeholder="1" onchange="items.find(x=>x.id===${i.id}).qty=parseInt(this.value)||1; save();">
                        <input type="number" class="price-input" value="${i.price||''}" placeholder="単価" onchange="items.find(x=>x.id===${i.id}).price=parseInt(this.value)||0; save();">
                    </div>
                    <div style="display:flex; gap:8px; margin-top:8px; align-items:center;">
                        <button class="tax-btn ${i.tax===8?'active':''}" onclick="const it=items.find(x=>x.id===${i.id}); it.tax=(it.tax===8?null:8); save();">8%</button>
                        <button class="tax-btn ${i.tax===10?'active':''}" onclick="const it=items.find(x=>x.id===${i.id}); it.tax=(it.tax===10?null:10); save();">10%</button>
                        <span style="font-size:0.8rem; font-weight:bold; color:var(--accent); margin-left:auto;">税込 ¥${taxed.toLocaleString()}</span>
                        <button onclick="items=items.filter(x=>x.id!==${i.id}); save();" style="border:none;background:none;color:#f87171;">✕</button>
                    </div>
                </div>`;
        }).join('');

        document.getElementById('totalPrice').innerText = currentTotal.toLocaleString();

        // 履歴
        hListEl.innerHTML = '';
        const mData = {};
        hist.forEach(g => { if(!mData[g.monthKey]) mData[g.monthKey]={t:0, g:[]}; mData[g.monthKey].t+=g.total; mData[g.monthKey].g.push(g); });
        Object.keys(mData).forEach(m => {
            hListEl.innerHTML += `<div class="month-summary-bar"><span>📅 ${m}</span><span>計 ¥${mData[m].t.toLocaleString()}</span></div>`;
            mData[m].g.forEach(g => {
                hListEl.innerHTML += `<div class="card" style="font-size:0.8rem; margin-top:8px;">
                    <div style="display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding-bottom:5px; margin-bottom:5px;">
                        <span>${g.date}</span><b style="color:var(--accent);">今回合計 ¥${g.total.toLocaleString()}</b>
                    </div>
                    ${g.items.map(it => `<div style="display:flex; justify-content:space-between; padding:4px 0;"><span>・${it.text}</span><span>¥${it.fPrice.toLocaleString()}</span></div>`).join('')}
                    <div style="text-align:right;"><button onclick="if(confirm('消す？')){hist=hist.filter(x=>x.id!==${g.id});save();}" style="border:none;background:none;color:#f87171;font-size:0.7rem;">削除</button></div>
                </div>`;
            });
        });
    }

    // 初回実行
    render();
</script>
</body>
</html>
