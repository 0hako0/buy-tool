<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>お買い物リスト</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="お買い物リスト">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3081/3081840.png">
    
    <style>
        :root {
            --primary: #3b82f6; --bg: #f3f4f6; --text-main: #1f2937;
            --text-muted: #6b7280; --white: #ffffff; --accent: #10b981;
            --fav: #f59e0b; --card-shadow: rgba(0,0,0,0.1);
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #111827; --text-main: #f9fafb; --text-muted: #9ca3af; --white: #1f2937; }
            input, textarea { background-color: #374151; color: white; border-color: #4b5563; }
            .chip { background: #1e3a8a; color: #60a5fa; border-color: #1e40af; }
        }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 448px; margin: 0 auto; padding: 1rem; padding-bottom: 160px; }
        h1 { font-size: 1.5rem; margin: 0 0 1rem 0.5rem; display: flex; align-items: center; gap: 8px; }
        .tabs { display: flex; background: var(--white); border-radius: 0.5rem; overflow: hidden; margin-bottom: 1rem; box-shadow: 0 1px 2px var(--card-shadow); }
        .tab-btn { flex: 1; padding: 0.75rem; border: none; background: none; color: var(--text-muted); cursor: pointer; font-size: 0.9rem; }
        .tab-active { background: var(--primary); color: white; font-weight: bold; }
        .card { background: var(--white); padding: 1rem; border-radius: 0.75rem; box-shadow: 0 1px 3px var(--card-shadow); margin-bottom: 1rem; }
        .input-group { display: flex; gap: 0.5rem; align-items: center; }
        input[type="text"] { flex: 1; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 16px; outline: none; }
        
        .mic-btn { font-size: 1.5rem; background: none; border: none; cursor: pointer; transition: transform 0.2s; color: var(--text-muted); }
        .mic-btn.recording { animation: pulse 1s infinite; color: #ef4444; transform: scale(1.2); }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .btn-add { background: var(--primary); color: white; padding: 0.5rem 1rem; border-radius: 0.5rem; border: none; font-weight: bold; }
        .month-summary-bar { background: #374151; color: #ffffff; padding: 0.5rem 1rem; border-radius: 0.5rem; margin-top: 1.5rem; margin-bottom: 0.5rem; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .item-card { display: flex; flex-direction: column; background: var(--white); padding: 0.75rem; border-radius: 0.5rem; margin-bottom: 0.5rem; box-shadow: 0 1px 2px var(--card-shadow); }
        .item-main { display: flex; align-items: center; gap: 0.4rem; }
        .item-text { flex: 1; font-size: 1rem; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-checked { text-decoration: line-through; color: var(--text-muted); opacity: 0.6; }
        
        .num-input { width: 40px; padding: 0.4rem; border: 1px solid #e5e7eb; border-radius: 0.25rem; text-align: center; font-size: 0.85rem; }
        .price-input { width: 75px; padding: 0.4rem; border: 1px solid #e5e7eb; border-radius: 0.25rem; text-align: right; font-size: 0.85rem; }
        
        .tax-btn { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; border: 1px solid #d1d5db; background: var(--bg); color: var(--text-muted); cursor: pointer; }
        .tax-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .final-price { font-size: 0.75rem; color: var(--accent); font-weight: bold; margin-left: auto; }
        .footer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1f2937; color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; padding-bottom: calc(1rem + env(safe-area-inset-bottom)); z-index: 100; }
        .total-amount { font-size: 1.4rem; font-weight: bold; color: var(--accent); }
        .hidden { display: none; }
        .history-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.05); cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛒 お買い物リスト</h1>

    <div class="tabs">
        <button onclick="switchTab('list')" id="tabList" class="tab-btn tab-active">リスト</button>
        <button onclick="switchTab('history')" id="tabHistory" class="tab-btn">履歴</button>
    </div>

    <div id="listView">
        <div class="card">
            <div class="input-group">
                <input type="text" id="itemInput" name="newItem" placeholder="何を買う？" aria-label="新規アイテム入力">
                <button onclick="startVoice()" id="micBtn" class="mic-btn" aria-label="音声入力開始">🎙️</button>
                <button onclick="addItem()" id="addBtn" class="btn-add">追加</button>
            </div>
            <div id="templateContainer" style="display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:10px;"></div>
        </div>
        <div id="shoppingList"></div>
        
        <div style="margin-top:2rem; opacity:0.5; text-align:center;">
            <details>
                <summary style="font-size:0.7rem; cursor:pointer;">設定・バックアップ</summary>
                <textarea id="dataExchange" name="dataBackup" style="width:100%; height:60px; font-size:0.7rem; margin:5px 0; padding:5px;" placeholder="JSON/CSVデータ"></textarea>
                <div style="display:flex; gap:5px; justify-content:center; margin-top:5px;">
                    <button onclick="exportJSON()" style="font-size:0.65rem;">JSON</button>
                    <button onclick="exportCSV()" style="font-size:0.65rem;">CSV保存</button>
                    <button onclick="importData()" style="font-size:0.65rem;">読込</button>
                </div>
            </details>
        </div>
    </div>

    <div id="historyView" class="hidden">
        <div id="historyList"></div>
    </div>
</div>

<div class="footer-bar" id="footerBar">
    <div><div style="font-size:0.7rem; color:#9ca3af;">チェック済合計</div><div class="total-amount">¥ <span id="totalPrice">0</span></div></div>
    <button onclick="archiveChecked()" id="archiveBtn" style="background:var(--primary); color:white; border:none; padding:0.8rem 1.2rem; border-radius:0.5rem; font-weight:bold;">履歴に保存</button>
</div>

<script>
    const STORAGE_KEY = 'shop_vFinal_v4_Attr';
    let items = JSON.parse(localStorage.getItem(STORAGE_KEY+'_i')) || [];
    let hist = JSON.parse(localStorage.getItem(STORAGE_KEY+'_h')) || [];
    let tpls = JSON.parse(localStorage.getItem(STORAGE_KEY+'_t')) || [];

    function save() {
        localStorage.setItem(STORAGE_KEY+'_i', JSON.stringify(items));
        localStorage.setItem(STORAGE_KEY+'_h', JSON.stringify(hist));
        localStorage.setItem(STORAGE_KEY+'_t', JSON.stringify(tpls));
        render();
    }

    function addItem(text = null, qty = 1, price = 0, tax = null) {
        const val = text || document.getElementById('itemInput').value.trim();
        if (!val) return;
        if (!text && items.find(i => i.text === val && !i.checked)) { alert('既に入っています'); return; }
        items.push({ id: Date.now(), text: val, checked: false, price: price, qty: qty || 1, tax: tax });
        if(!text) document.getElementById('itemInput').value = '';
        save();
    }

    function startVoice() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return;
        const rec = new SpeechRecognition(); rec.lang = 'ja-JP';
        const btn = document.getElementById('micBtn');
        const reset = () => { btn.classList.remove('recording'); btn.textContent = '🎙️'; };
        rec.onstart = () => { btn.classList.add('recording'); btn.textContent = '🔴'; };
        rec.onend = () => setTimeout(reset, 500);
        rec.onerror = reset;
        rec.onresult = (e) => addItem(e.results[0][0].transcript.replace(/[。．]$/, ""));
        rec.start();
    }

    function archiveChecked() {
        const checked = items.filter(i => i.checked);
        const total = checked.reduce((s, i) => s + Math.floor((i.price * i.qty) * (1 + (i.tax||0)/100)), 0);
        if (!checked.length || total === 0) return alert("金額入りのチェック済みがありません");
        const now = new Date();
        hist.unshift({
            id: Date.now(), date: `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`,
            monthKey: `${now.getFullYear()}年${now.getMonth()+1}月`, total: total,
            items: checked.map(i => ({...i, fPrice: Math.floor((i.price * i.qty) * (1 + (i.tax||0)/100))}))
        });
        items = items.filter(i => !i.checked);
        save();
    }

    function exportCSV() {
        let csv = "日付,月,商品名,単価,数量,税率,税込合計\n";
        hist.forEach(g => g.items.forEach(it => { csv += `${g.date},${g.monthKey},${it.text},${it.price},${it.qty},${it.tax||0},${it.fPrice}\n`; }));
        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: 'text/csv' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `history.csv`; a.click();
    }

    function render() {
        const listEl = document.getElementById('shoppingList');
        const tplEl = document.getElementById('templateContainer');
        let currentTotal = 0;

        tplEl.innerHTML = tpls.map(t => `<button class="chip" onclick="
