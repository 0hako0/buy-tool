<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>お買い物リスト</title>
    <style>
        :root {
            --primary: #3b82f6; 
            --bg: #111827; 
            --text-main: #f9fafb;
            --text-muted: #9ca3af; 
            --white: #1f2937; 
            --accent: #10b981;
            --card-shadow: rgba(0,0,0,0.4);
        }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 140px; }
        .container { max-width: 448px; margin: 0 auto; padding: 1rem; }
        
        .card { background: var(--white); padding: 1rem; border-radius: 0.75rem; box-shadow: 0 4px 6px var(--card-shadow); margin-bottom: 1rem; }
        .input-group { display: flex; gap: 0.5rem; align-items: center; }
        input[type="text"] { flex: 1; padding: 0.75rem; border: 1px solid #374151; border-radius: 0.5rem; background: #374151; color: white; font-size: 16px; outline: none; }
        
        .btn-add { background: var(--primary); color: white; padding: 0.75rem 1.2rem; border-radius: 0.5rem; border: none; font-weight: bold; cursor: pointer; }
        .mic-btn { font-size: 1.5rem; background: none; border: none; cursor: pointer; color: var(--text-muted); }
        .mic-btn.recording { color: #ef4444; }

        .item-card { background: var(--white); padding: 0.8rem; border-radius: 0.5rem; margin-bottom: 0.5rem; box-shadow: 0 2px 4px var(--card-shadow); }
        .item-main { display: flex; align-items: center; gap: 0.5rem; }
        .item-text { flex: 1; font-weight: 500; cursor: pointer; }
        /* チェック済みをしっかり薄くする */
        .item-checked { text-decoration: line-through; color: var(--text-muted); opacity: 0.4; }

        .num-input { width: 45px; padding: 0.4rem; border: 1px solid #4b5563; border-radius: 0.25rem; background: #374151; color: white; text-align: center; }
        .price-input { width: 80px; padding: 0.4rem; border: 1px solid #4b5563; border-radius: 0.25rem; background: #374151; color: white; text-align: right; }

        .footer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #111827; color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-top: 1px solid #374151; padding-bottom: calc(1rem + env(safe-area-inset-bottom)); }
        .total-amount { font-size: 1.4rem; font-weight: bold; color: var(--accent); }

        .tabs { display: flex; background: var(--white); border-radius: 0.5rem; margin-bottom: 1rem; overflow: hidden; }
        .tab-btn { flex: 1; padding: 0.75rem; border: none; background: none; color: var(--text-muted); cursor: pointer; }
        .tab-active { background: var(--primary); color: white; font-weight: bold; }
        
        .hidden { display: none !important; }
        .tax-btn { font-size: 0.7rem; padding: 4px 8px; border: 1px solid #4b5563; border-radius: 4px; background: #374151; color: white; cursor: pointer; }
        .tax-btn.active { background: var(--primary); }
        .chip { padding: 4px 12px; border-radius: 99px; background: #1e3a8a; color: #60a5fa; font-size: 0.75rem; border: none; cursor: pointer; margin-right: 5px; margin-bottom: 5px; }
        .prev-price { font-size: 0.65rem; color: var(--text-muted); text-decoration: underline; margin-left: 5px; cursor: pointer; }
        
        /* 履歴の月間ヘッダー */
        .month-header { background: #374151; padding: 8px 12px; border-radius: 6px; margin: 15px 0 8px; font-size: 0.85rem; display: flex; justify-content: space-between; font-weight: bold; }
        .re-add-hint { font-size: 0.7rem; color: var(--text-muted); text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛒 お買い物リスト</h1>

    <div class="tabs">
        <button onclick="switchTab('list')" id="tabList" class="tab-btn tab-active">リスト</button>
        <button onclick="switchTab('history')" id="tabHistory" class="tab-btn">履歴</button>
    </div>

    <div id="listView">
        <div class="card">
            <div class="input-group">
                <input type="text" id="itemInput" autocomplete="off" placeholder="何を買う？" onkeypress="if(event.key==='Enter') addItem()">
                <button onclick="startVoice()" id="micBtn" class="mic-btn">🎙️</button>
                <button onclick="addItem()" class="btn-add">追加</button>
            </div>
            <div id="templateContainer" style="display:flex; flex-wrap:wrap; margin-top:10px;"></div>
        </div>
        <div id="shoppingList"></div>
    </div>

    <div id="historyView" class="hidden">
        <div class="re-add-hint">タップで再追加</div>
        <div id="historyList"></div>
    </div>
</div>

<div class="footer-bar" id="footerBar">
    <div><div style="font-size:0.7rem; color:#9ca3af;">チェック済合計</div><div class="total-amount">¥ <span id="totalPrice">0</span></div></div>
    <button onclick="archiveChecked()" id="archiveBtn" style="background:var(--primary); color:white; border:none; padding:0.8rem 1.2rem; border-radius:0.5rem; font-weight:bold;">履歴に保存</button>
</div>

<script>
    const KEY = 'SHOP_DATA_FINAL_V1';
    let items = JSON.parse(localStorage.getItem(KEY+'_i')) || [];
    let hist = JSON.parse(localStorage.getItem(KEY+'_h')) || [];
    let tpls = JSON.parse(localStorage.getItem(KEY+'_t')) || [];

    function save() {
        localStorage.setItem(KEY+'_i', JSON.stringify(items));
        localStorage.setItem(KEY+'_h', JSON.stringify(hist));
        localStorage.setItem(KEY+'_t', JSON.stringify(tpls));
        render();
    }

    window.addItem = function(text = null) {
        const input = document.getElementById('itemInput');
        const val = (text || input.value).trim();
        if (!val) return;
        if (items.some(i => i.text === val && !i.checked)) {
            alert('既にリストにあります');
            input.value = '';
            return;
        }
        items.push({ id: Date.now() + Math.random(), text: val, checked: false, price: 0, qty: 1, tax: null });
        input.value = '';
        save();
    };

    window.startVoice = function() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return;
        const rec = new SpeechRecognition();
        rec.lang = 'ja-JP';
        const btn = document.getElementById('micBtn');
        rec.onstart = () => { btn.classList.add('recording'); btn.textContent = '🔴'; };
        rec.onresult = (e) => {
            addItem(e.results[0][0].transcript.replace(/[。．]$/, ""));
            rec.stop();
        };
        rec.onend = () => { btn.classList.remove('recording'); btn.textContent = '🎙️'; };
        rec.start();
    };

    window.switchTab = function(t) {
        document.getElementById('listView').classList.toggle('hidden', t!=='list');
        document.getElementById('historyView').classList.toggle('hidden', t!=='history');
        document.getElementById('tabList').className = `tab-btn ${t==='list'?'tab-active':''}`;
        document.getElementById('tabHistory').className = `tab-btn ${t==='history'?'tab-active':''}`;
        document.getElementById('footerBar').classList.toggle('hidden', t!=='list');
    };

    window.archiveChecked = function() {
        const checked = items.filter(i => i.checked);
        if (!checked.length) return;
        const total = checked.reduce((s, i) => s + Math.floor((i.price * i.qty) * (1 + (i.tax||0)/100)), 0);
        const now = new Date();
        hist.unshift({
            id: Date.now(),
            date: `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`,
            monthKey: `${now.getFullYear()}年${now.getMonth()+1}月`,
            total: total,
            items: checked.map(i => ({...i, fPrice: Math.floor((i.price * i.qty) * (1 + (i.tax||0)/100))}))
        });
        items = items.filter(i => !i.checked);
        save();
    };

    function render() {
        const listEl = document.getElementById('shoppingList');
        const tplEl = document.getElementById('templateContainer');
        const hListEl = document.getElementById('historyList');
        if(!listEl) return;

        let currentTotal = 0;
        tplEl.innerHTML = tpls.map(t => `<button class="chip" onclick="addItem('${t}')">＋${t}</button>`).join('');

        listEl.innerHTML = items.map(i => {
            const taxed = Math.floor((i.price * i.qty) * (1 + (i.tax||0)/100));
            if (i.checked) currentTotal += taxed;
            
            let lastPrice = null;
            for(let g of hist) {
                let found = g.items.find(x => x.text === i.text);
                if(found && found.price > 0) { lastPrice = found.price; break; }
            }

            return `
                <div class="item-card">
                    <div class="item-main">
                        <input type="checkbox" ${i.checked?'checked':''} onchange="items.find(x=>x.id===${i.id}).checked=this.checked; save();" style="width:24px;height:24px;">
                        <span class="item-text ${i.checked?'item-checked':''}" onclick="const n=prompt('修正', '${i.text}'); if(n){items.find(x=>x.id===${i.id}).text=n; save();}">${i.text}</span>
                        <button onclick="tpls.includes('${i.text}')?tpls=tpls.filter(x=>x!=='${i.text}'):tpls.push('${i.text}'); save();" style="border:none;background:none;color:${tpls.includes(i.text)?'#f59e0b':'#4b5563'}; font-size:1.2rem;">★</button>
                        <input type="number" class="num-input" value="${i.qty}" onchange="items.find(x=>x.id===${i.id}).qty=parseInt(this.value)||1; save();">
                        <input type="number" class="price-input" value="${i.price||''}" placeholder="単価" onchange="items.find(x=>x.id===${i.id}).price=parseInt(this.value)||0; save();">
                    </div>
                    <div style="display:flex; gap:8px; margin-top:10px; align-items:center;">
                        <button class="tax-btn ${i.tax===8?'active':''}" onclick="const it=items.find(x=>x.id===${i.id}); it.tax=(it.tax===8?null:8); save();">8%</button>
                        <button class="tax-btn ${i.tax===10?'active':''}" onclick="const it=items.find(x=>x.id===${i.id}); it.tax=(it.tax===10?null:10); save();">10%</button>
                        ${lastPrice ? `<span class="prev-price" onclick="items.find(x=>x.id===${i.id}).price=${lastPrice}; save();">前回: ¥${lastPrice}</span>` : ''}
                        <span style="font-size:0.85rem; font-weight:bold; color:var(--accent); margin-left:auto;">税込 ¥${taxed.toLocaleString()}</span>
                        <button onclick="items=items.filter(x=>x.id!==${i.id}); save();" style="border:none;background:none;color:#f87171;margin-left:5px;">✕</button>
                    </div>
                </div>`;
        }).join('');

        document.getElementById('totalPrice').innerText = currentTotal.toLocaleString();

        // 履歴の描画（タップで再追加機能付き）
        hListEl.innerHTML = '';
        const mData = {};
        hist.forEach(g => { if(!mData[g.monthKey]) mData[g.monthKey]={t:0, g:[]}; mData[g.monthKey].t+=g.total; mData[g.monthKey].g.push(g); });
        Object.keys(mData).forEach(m => {
            hListEl.innerHTML += `<div class="month-header"><span>📅 ${m}</span><span>計 ¥${mData[m].t.toLocaleString()}</span></div>`;
            mData[m].g.forEach(g => {
                hListEl.innerHTML += `<div class="card" style="font-size:0.8rem; margin-top:8px;">
                    <div style="display:flex; justify-content:space-between; border-bottom:1px solid #4b5563; padding-bottom:8px; margin-bottom:5px;">
                        <span>${g.date}</span><b style="color:var(--accent);">¥${g.total.toLocaleString()}</b>
                    </div>
                    ${g.items.map(it => `<div onclick="switchTab('list'); addItem('${it.text}')" style="display:flex; justify-content:space-between; padding:6px 0; cursor:pointer; border-bottom: 1px solid rgba(255,255,255,0.05);"><span>・${it.text} (${it.qty})</span><span>¥${it.fPrice.toLocaleString()}</span></div>`).join('')}
                    <div style="text-align:right; margin-top:8px;"><button onclick="if(confirm('削除？')){hist=hist.filter(x=>x.id!==${g.id});save();}" style="border:none;background:none;color:#f87171;font-size:0.75rem;">削除</button></div>
                </div>`;
            });
        });
    }

    render();
</script>
</body>
</html>
